<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Aqlli Lug'at</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .drag-over { border-color: #38bdf8 !important; background-color: rgba(56, 189, 248, 0.1) !important; }
        .word-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .word-card:hover { transform: translateY(-3px); border-color: #ef4444; background-color: rgba(239, 68, 68, 0.1); }
        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }
        .loader { border-top-color: #38bdf8; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .flashcard-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateX(180deg); }
        .flashcard-front, .flashcard-back { backface-visibility: hidden; position: absolute; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 1rem; border: 2px solid #334155; }
        .flashcard-back { transform: rotateX(180deg); background-color: #1e3a8a; }
        .perspective-1000 { perspective: 1000px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <div id="main-view" class="w-full max-w-4xl bg-slate-800/50 backdrop-blur-xl border border-slate-700 rounded-3xl p-8 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-sky-400 mb-2 italic">AI SMART DICTIONARY</h1>
            <p class="text-slate-400">Rasmni yuklang, bilgan so'zlaringizni o'chirib, qolganini yodlang!</p>
        </header>

        <div id="dropZone" class="relative border-4 border-dashed border-slate-700 bg-slate-900/50 rounded-2xl h-64 flex flex-col items-center justify-center cursor-pointer group transition-all mb-8">
            <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
            <div id="uploadUI" class="text-center">
                <i class="fa-solid fa-cloud-arrow-up text-6xl text-slate-500 group-hover:text-sky-400 transition-colors mb-4"></i>
                <p class="text-xl font-bold text-slate-300">Rasmni shu yerga tashlang</p>
                <p class="text-slate-500 text-sm mt-1">yoki tanlash uchun bosing</p>
            </div>
            <img id="previewImg" class="absolute inset-0 w-full h-full object-contain p-4 hidden rounded-2xl" alt="Preview">
        </div>

        <button id="scanBtn" onclick="sendToAI()" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-black text-xl rounded-2xl shadow-xl transition-all active:scale-95 flex justify-center items-center gap-3">
            <i class="fa-solid fa-bolt-lightning"></i> SKANER QILISH
        </button>

        <div id="loading" class="hidden mt-10 text-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-14 w-14 mx-auto mb-4"></div>
            <p class="text-sky-400 font-bold animate-pulse text-lg">AI tahlil qilmoqda...</p>
        </div>

        <div id="resultBox" class="hidden mt-12 fade-in">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 border-b border-slate-700 pb-4">
                <h2 class="text-2xl font-bold text-slate-100 italic">Topilgan so'zlar</h2>
                <button onclick="openPractice()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-graduation-cap"></i> MASHQ QILISH
                </button>
            </div>
            
            <div id="wordsContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                </div>
        </div>
    </div>

    <div id="practice-view" class="hidden w-full max-w-xl bg-slate-800 border border-slate-700 rounded-3xl p-8 shadow-2xl text-center">
        <h2 class="text-3xl font-bold text-emerald-400 mb-8 italic">Memory Training</h2>
        <p id="counter" class="text-slate-500 font-mono mb-4 text-lg">0 / 0</p>

        <div class="perspective-1000 w-full h-72 mb-10 cursor-pointer" onclick="flip()">
            <div id="cardInner" class="flashcard-inner w-full h-full relative">
                <div class="flashcard-front bg-slate-700">
                    <h3 id="frontText" class="text-4xl font-black px-4">Word</h3>
                </div>
                <div class="flashcard-back">
                    <h3 id="backText" class="text-3xl font-bold px-4 text-white">Tarjima</h3>
                </div>
            </div>
        </div>

        <div class="flex gap-4">
            <button onclick="closePractice()" class="flex-1 py-4 bg-slate-700 rounded-xl font-bold hover:bg-slate-600 transition-all">Tugatish</button>
            <button onclick="nextCard()" class="flex-[2] py-4 bg-emerald-600 rounded-xl font-bold text-xl hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-900/20">Keyingisi <i class="fa-solid fa-arrow-right ml-2"></i></button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewImg = document.getElementById('previewImg');
        const uploadUI = document.getElementById('uploadUI');
        const wordsContainer = document.getElementById('wordsContainer');
        
        let allWords = [];
        let pIndex = 0;

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('drag-over');
            if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if(e.target.files[0]) handleFile(e.target.files[0]); });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewImg.classList.remove('hidden');
                uploadUI.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function sendToAI() {
            const file = fileInput.files[0];
            if(!file) return alert("Rasm yuklang!");

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultBox').classList.add('hidden');
            document.getElementById('scanBtn').disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/upload/', { method: 'POST', body: formData });
                const data = await res.json();

                if(data.error) alert(data.error);
                else {
                    allWords = [...(data.words || []), ...(data.idioms || [])];
                    render();
                    document.getElementById('resultBox').classList.remove('hidden');
                }
            } catch (e) {
                alert("Xatolik!");
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('scanBtn').disabled = false;
            }
        }

        function render() {
            wordsContainer.innerHTML = '';
            if(allWords.length === 0) {
                wordsContainer.innerHTML = '<p class="col-span-full text-center text-slate-500">Barcha so\'zlar o\'chirildi!</p>';
                return;
            }
            allWords.forEach((w, i) => {
                const el = document.createElement('div');
                el.className = "word-card bg-slate-900 border border-slate-700 p-4 rounded-2xl cursor-pointer relative group flex flex-col items-center justify-center text-center";
                el.innerHTML = `
                    <div class="absolute inset-0 bg-red-600/20 opacity-0 group-hover:opacity-100 flex items-center justify-center rounded-2xl transition-all">
                        <i class="fa-solid fa-trash text-2xl text-red-400"></i>
                    </div>
                    <span class="text-lg font-black text-white leading-tight">${w.en}</span>
                    <span class="text-sm text-sky-400 mt-1 font-medium italic">${w.uz}</span>
                `;
                el.onclick = () => {
                    el.classList.add('fade-out');
                    setTimeout(() => {
                        allWords = allWords.filter(item => item.en !== w.en);
                        render();
                    }, 300);
                };
                wordsContainer.appendChild(el);
            });
        }

        // Practice
        function openPractice() {
            if(allWords.length === 0) return;
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('practice-view').classList.remove('hidden');
            pIndex = 0;
            showCard();
        }

        function closePractice() {
            document.getElementById('practice-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        }

        function showCard() {
            document.getElementById('cardInner').classList.remove('is-flipped');
            document.getElementById('counter').innerText = `${pIndex + 1} / ${allWords.length}`;
            document.getElementById('frontText').innerText = allWords[pIndex].en;
            document.getElementById('backText').innerText = allWords[pIndex].uz;
        }

        function flip() { document.getElementById('cardInner').classList.toggle('is-flipped'); }

        function nextCard() {
            pIndex++;
            if(pIndex >= allWords.length) {
                alert("Hammasini yodlab bo'ldingiz!");
                closePractice();
            } else {
                showCard();
            }
        }
    </script>
</body>
</html>
