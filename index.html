<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SMART DICTIONARY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .word-card:hover { border-color: #ef4444; background-color: rgba(239, 68, 68, 0.1); }
        .flashcard-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateX(180deg); }
        .flashcard-front, .flashcard-back { backface-visibility: hidden; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; border-radius: 1rem; }
        .flashcard-back { transform: rotateX(180deg); background-color: #1e3a8a; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">
    <div id="main-view" class="w-full max-w-4xl bg-slate-800/50 backdrop-blur-xl border border-slate-700 rounded-3xl p-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-sky-400 mb-2 italic">AI SMART DICTIONARY</h1>
            <p class="text-slate-400">Rasmni yuklang, bilgan so'zlaringizni o'chirib, qolganini yodlang!</p>
        </header>

        <div id="dropZone" class="relative border-4 border-dashed border-slate-700 bg-slate-900/50 rounded-2xl h-64 flex flex-col items-center justify-center cursor-pointer transition-all mb-8">
            <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
            <div id="uploadUI" class="text-center">
                <i class="fa-solid fa-cloud-arrow-up text-6xl text-slate-500 mb-4"></i>
                <p class="text-xl font-bold text-slate-300">Rasmni shu yerga tashlang yoki bosing</p>
            </div>
            <img id="previewImg" class="absolute inset-0 w-full h-full object-contain p-4 hidden rounded-2xl">
        </div>

        <button id="scanBtn" onclick="sendToAI()" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-black text-xl rounded-2xl shadow-xl transition-all flex justify-center items-center gap-3">
            <i class="fa-solid fa-bolt-lightning"></i> SKANER QILISH
        </button>

        <div id="loading" class="hidden mt-10 text-center">
            <div class="loader animate-spin border-4 border-t-4 border-sky-400 rounded-full h-12 w-12 mx-auto mb-4"></div>
            <p class="text-sky-400 font-bold">AI tahlil qilmoqda...</p>
        </div>

        <div id="resultBox" class="hidden mt-12">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold italic">Topilgan so'zlar</h2>
                <button onclick="openPractice()" class="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold">MASHQ QILISH</button>
            </div>
            <div id="wordsContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
        </div>
    </div>

    <div id="practice-view" class="hidden w-full max-w-xl bg-slate-800 border border-slate-700 rounded-3xl p-8 text-center">
        <h2 class="text-3xl font-bold text-emerald-400 mb-8 italic">Memory Training</h2>
        <div class="relative h-72 mb-10 cursor-pointer" onclick="flip()" style="perspective: 1000px;">
            <div id="cardInner" class="flashcard-inner w-full h-full relative">
                <div class="flashcard-front bg-slate-700"><h3 id="frontText" class="text-4xl font-black">Word</h3></div>
                <div class="flashcard-back"><h3 id="backText" class="text-3xl font-bold text-white">Tarjima</h3></div>
            </div>
        </div>
        <div class="flex gap-4">
            <button onclick="closePractice()" class="flex-1 py-4 bg-slate-700 rounded-xl font-bold">Tugatish</button>
            <button onclick="nextCard()" class="flex-[2] py-4 bg-emerald-600 rounded-xl font-bold text-xl">Keyingisi</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const uploadUI = document.getElementById('uploadUI');
        const wordsContainer = document.getElementById('wordsContainer');
        let allWords = [];
        let pIndex = 0;

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { previewImg.src = ev.target.result; previewImg.classList.remove('hidden'); uploadUI.classList.add('hidden'); };
                reader.readAsDataURL(file);
            }
        });

        async function sendToAI() {
            const file = fileInput.files[0];
            if(!file) return alert("Rasm yuklang!");
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resultBox').classList.add('hidden');
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/upload/', { method: 'POST', body: formData });
                const data = await res.json();
                if(data.error) alert(data.error + ": " + (data.details || ""));
                else { allWords = [...(data.words || []), ...(data.idioms || [])]; render(); document.getElementById('resultBox').classList.remove('hidden'); }
            } catch (e) { alert("Xatolik yuz berdi!"); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }

        function render() {
            wordsContainer.innerHTML = '';
            allWords.forEach(w => {
                const el = document.createElement('div');
                el.className = "bg-slate-900 border border-slate-700 p-4 rounded-2xl cursor-pointer hover:border-red-500 transition-all text-center";
                el.innerHTML = `<span class="text-lg font-black text-white block">${w.en}</span><span class="text-sm text-sky-400 italic">${w.uz}</span>`;
                el.onclick = () => { allWords = allWords.filter(item => item.en !== w.en); render(); };
                wordsContainer.appendChild(el);
            });
        }

        function openPractice() { if(allWords.length === 0) return; document.getElementById('main-view').classList.add('hidden'); document.getElementById('practice-view').classList.remove('hidden'); pIndex = 0; showCard(); }
        function closePractice() { document.getElementById('practice-view').classList.add('hidden'); document.getElementById('main-view').classList.remove('hidden'); }
        function showCard() { document.getElementById('cardInner').classList.remove('is-flipped'); document.getElementById('frontText').innerText = allWords[pIndex].en; document.getElementById('backText').innerText = allWords[pIndex].uz; }
        function flip() { document.getElementById('cardInner').classList.toggle('is-flipped'); }
        function nextCard() { pIndex++; if(pIndex >= allWords.length) { alert("Tugadi!"); closePractice(); } else { showCard(); } }
    </script>
</body>
</html>
